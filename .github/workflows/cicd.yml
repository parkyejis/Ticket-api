# 1. 이 작전의 이름
name: Spring Boot CI/CD 파이프라인

# 2. 언제 실행할래? (Trigger)
on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 push 될 때마다 실행해라!

# 3. 무슨 일을 할래? (Jobs)
jobs:
  build:
    runs-on: ubuntu-latest # 깃허브가 빌려주는 우분투 컴퓨터에서 실행해라!

    steps: # 4. 세부 실행 순서
      - name: 1. 내 코드 가져오기
        uses: actions/checkout@v3

      - name: 2. 자바(JDK 17) 세팅하기
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. 깃허브 컴퓨터에서 빌드 권한 주기
        run: chmod +x ./gradlew

      - name: 4. 스프링 부트 프로젝트 빌드(테스트 포함)하기 🚀 (이게 CI의 핵심!)
        run: ./gradlew build

    # --- 여기까지가 CI (안전 검사) ---

    # --- 이 아래부터는 빌드된 파일을 AWS 서버로 보내는 CD 로직을 짭니다 ---